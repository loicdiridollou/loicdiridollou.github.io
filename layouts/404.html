{{ define "main" }}
<section class="hero reveal">
  <div class="hero-inner">
    <div class="hero-text">
      <p class="hero-label">404 — page not found</p>
      <h1 class="hero-name">Lost in the void.</h1>
      <p class="hero-bio">This page doesn't exist. It may have been moved, deleted, or never existed in the first place.</p>
      <div class="hero-actions">
        <a href="/" class="btn btn-primary">Go home</a>
        <a href="/projects" class="btn btn-ghost">Projects</a>
      </div>
    </div>
    <div class="hero-mark" aria-hidden="true">
      <svg viewBox="0 0 46 46" fill="none" class="hero-svg">
        <circle cx="11" cy="19" r="2.5" fill="currentColor" opacity="0.22"/>
        <circle cx="17" cy="26" r="5"   fill="var(--slate)"/>
        <circle cx="29" cy="18" r="8"   fill="currentColor"/>
        <circle cx="37" cy="30" r="4"   fill="var(--indigo)"/>
        <circle cx="29" cy="36" r="2.5" fill="var(--indigo)" opacity="0.45"/>
      </svg>
    </div>
  </div>
</section>
{{ end }}
