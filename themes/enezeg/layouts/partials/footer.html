<footer class="footer">
  <div class="footer-inner">

    <a href="/" class="footer-logo" aria-label="enezeg home">
      <svg width="22" height="22" viewBox="0 0 46 46" fill="none" aria-hidden="true">
        <circle cx="11" cy="19" r="2.5" fill="currentColor" opacity="0.22"/>
        <circle cx="17" cy="26" r="5"   fill="var(--slate)"/>
        <circle cx="29" cy="18" r="8"   fill="currentColor"/>
        <circle cx="37" cy="30" r="4"   fill="var(--indigo)"/>
        <circle cx="29" cy="36" r="2.5" fill="var(--indigo)" opacity="0.45"/>
      </svg>
    </a>

    <div class="footer-links">
      {{ with .Site.Params.github }}
      <a href="https://github.com/{{ . }}" class="footer-link" target="_blank" rel="noopener">GitHub</a>
      {{ end }}
      {{ with .Site.Params.twitter }}
      <a href="https://twitter.com/{{ . }}" class="footer-link" target="_blank" rel="noopener">Twitter</a>
      {{ end }}
      {{ with .Site.Params.linkedin }}
      <a href="https://linkedin.com/in/{{ . }}" class="footer-link" target="_blank" rel="noopener">LinkedIn</a>
      {{ end }}
    </div>

    <p class="footer-copy">© {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}</p>

  </div>
</footer>
